<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mood-Based Recommender 🎬🎵</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1e1e2f, #2e3350, #24243e);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    color: #fff;
  }

  h1 {
    font-size: clamp(1.8rem, 4vw, 3rem);
    margin-bottom: 1rem;
    text-align: center;
  }


  .mood-selector {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .mood-btn {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 30px;
    padding: 10px 20px;
    font-size: 1rem;
    color: #fff;
    cursor: pointer;
    transition: 0.3s ease;
    backdrop-filter: blur(8px);
  }

  .mood-btn:hover,
  .mood-btn.active {
    background: rgba(255, 255, 255, 0.3);
    transform: translateY(-3px);
  }

  .buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .action-btn {
    background: linear-gradient(45deg, #ff5f6d, #ffc371);
    border: none;
    border-radius: 30px;
    padding: 12px 25px;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
    font-size: 1rem;
  }

  .action-btn:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg, #ffc371, #ff5f6d);
  }

 
  #suggestionsContainer {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
  }

  .category {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
    transition: transform 0.3s ease, background 0.3s ease;
    animation: fadeIn 0.5s ease;
  }

  .category:hover {
    transform: translateY(-5px);
    background: rgba(255, 255, 255, 0.15);
  }

  .category h2 {
    margin-bottom: 0.8rem;
    border-bottom: 2px solid rgba(255, 255, 255, 0.2);
    padding-bottom: 0.4rem;
    font-size: 1.3rem;
  }

  ul {
    list-style: none;
    margin-top: 0.5rem;
  }

  li {
    margin: 5px 0;
    font-size: 1.05rem;
    line-height: 1.3;
  }

  
  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
</head>

<body>

  <h1>Mood-Based Recommender <span id="moodEmoji">🎭</span></h1>

  <div class="mood-selector">
    <button class="mood-btn" onclick="setMood('happy')">😊 Happy</button>
    <button class="mood-btn" onclick="setMood('sad')">😔 Sad</button>
    <button class="mood-btn" onclick="setMood('romantic')">💖 Romantic</button>
    <button class="mood-btn" onclick="setMood('energetic')">⚡ Energetic</button>
    <button class="mood-btn" onclick="setMood('chill')">🌙 Chill</button>
  </div>

  <div class="buttons">
    <button class="action-btn" onclick="getSuggestions()">🎬 Get Suggestions</button>
    <button class="action-btn" onclick="refreshSuggestions()">🔁 Try Again</button>
  </div>

  <div id="suggestionsContainer"></div>

<script>
  const data = {
    happy: {
      emoji: "😊",
      movies: ["Sing", "The Lego Movie", "Paddington 2", "Zootopia", "The Intern"],
      series: ["Brooklyn Nine-Nine", "Friends", "Parks and Recreation", "Ted Lasso", "The Good Place"],
      songs: ["Happy - Pharrell Williams", "Uptown Funk - Bruno Mars", "Can’t Stop the Feeling - Justin Timberlake", "Good as Hell - Lizzo", "Sugar - Maroon 5"]
    },
    sad: {
      emoji: "😔",
      movies: ["The Pursuit of Happyness", "Inside Out", "A Star is Born", "The Green Mile", "Marley & Me"],
      series: ["BoJack Horseman", "This Is Us", "After Life", "13 Reasons Why", "Breaking Bad"],
      songs: ["Someone Like You - Adele", "Fix You - Coldplay", "Let Her Go - Passenger", "When I Was Your Man - Bruno Mars", "Stay - Rihanna"]
    },
    romantic: {
      emoji: "💖",
      movies: ["The Notebook", "La La Land", "Titanic", "Pride & Prejudice", "About Time"],
      series: ["Bridgerton", "Outlander", "Modern Love", "Emily in Paris", "The Vampire Diaries"],
      songs: ["Perfect - Ed Sheeran", "All of Me - John Legend", "Love Story - Taylor Swift", "Just the Way You Are - Bruno Mars", "Thinking Out Loud - Ed Sheeran"]
    },
    energetic: {
      emoji: "⚡",
      movies: ["Mad Max: Fury Road", "Guardians of the Galaxy", "Baby Driver", "Top Gun: Maverick", "The Dark Knight"],
      series: ["The Boys", "Attack on Titan", "Cobra Kai", "Money Heist", "Daredevil"],
      songs: ["Eye of the Tiger - Survivor", "Stronger - Kanye West", "Believer - Imagine Dragons", "Can’t Hold Us - Macklemore", "Lose Yourself - Eminem"]
    },
    chill: {
      emoji: "🌙",
      movies: ["Before Sunrise", "Lost in Translation", "The Secret Life of Walter Mitty", "Her", "Soul"],
      series: ["Chef’s Table", "The Office", "Planet Earth", "Modern Family", "Anne with an E"],
      songs: ["Sunflower - Post Malone", "Electric Feel - MGMT", "Breezeblocks - Alt-J", "Location - Khalid", "Riptide - Vance Joy"]
    }
  };

  let selectedMood = null;

  function setMood(mood) {
    selectedMood = mood;
    document.getElementById("moodEmoji").textContent = data[mood].emoji;

   
    document.querySelectorAll(".mood-btn").forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");
  }

 
  function getRandomItems(arr, count = 3) {
    const shuffled = [...arr].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, count);
  }

  function getSuggestions() {
    if (!selectedMood) {
      alert("Please select a mood first!");
      return;
    }

    const mood = data[selectedMood];
    const container = document.getElementById("suggestionsContainer");

    container.innerHTML = `
      ${createCategory("🎬 Movies", getRandomItems(mood.movies, 4))}
      ${createCategory("📺 Web Series", getRandomItems(mood.series, 4))}
      ${createCategory("🎵 Songs", getRandomItems(mood.songs, 4))}
    `;
  }

  function createCategory(title, items) {
    return `
      <div class="category">
        <h2>${title}</h2>
        <ul>${items.map(item => `<li>${item}</li>`).join("")}</ul>
      </div>
    `;
  }

  function refreshSuggestions() {
    getSuggestions();
  }
</script>

</body>
</html>
